name: Lumo
options:
  bundleIdPrefix: app.lumo
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"
    DEVELOPMENT_TEAM: 2UANJX7ATM
    PROVISIONING_PROFILE_SPECIFIER: ""
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.4"
targets:
  Lumo:
    type: application
    platform: macOS
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    sources:
      - path: Sources/Lumo
    dependencies:
      - package: KeyboardShortcuts
      - package: Sparkle
    info:
      path: Sources/Lumo/Info.plist
      properties:
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "2"
        LSUIElement: true
        NSHumanReadableCopyright: ""
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSScreenCaptureUsageDescription: "Lumo captures a screen region you select to extract and translate its text."
        SUPublicEDKey: "44JMfuhD9wodqkPx/GL+xHWteYRACSO9XJU6KtC31WU="
        SUFeedURL: "https://newturn2017.github.io/Lumo/appcast.xml"
        SUEnableAutomaticChecks: true
    entitlements:
      path: Sources/Lumo/Lumo.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    scheme:
      testTargets:
        - LumoTests
  LumoTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/LumoTests
    dependencies:
      - target: Lumo
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
